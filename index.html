<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>液状化シミュレーション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>液状化シミュレーション</h2>

    <div class="main-layout">
        <div id="controls">
            <h3>地盤条件を選んでみよう！</h3>
            
            <div class="box">
                <p>① 土の種類</p>
                <label><input type="radio" name="soil_type" value="2" id="q1_yes">砂が多い地盤(砂質土)</label>   
                <label><input type="radio" name="soil_type" value="0" checked>粘土が多い地盤(粘性土)</label>
            </div>

            <div class="box">
                <p>② 粒の大きさ</p>
                <label><input type="radio" name="soil_size" value="1" id="q2_yes">均一な粒</label>   
                <label><input type="radio" name="soil_size" value="0" checked>バラバラな粒</label>
            </div>

            <div class="box">
                <p>③ 土の締まり具合</p>
                <label><input type="radio" name="soil_piled" value="2" id="q3_yes">緩い</label>   
                <label><input type="radio" name="soil_piled" value="0" checked>固い</label>
            </div>

            <div class="box">
                <p>④ 地面の下で水に浸かっている範囲</p>
                <label><input type="radio" name="water_level" value="2" id="q4_yes">地表近くまで来ている</label>   
                <label><input type="radio" name="water_level" value="0" checked>深いところにある</label>
            </div>

            <div class="box">
                <p>⑤ 土地の成り立ち</p>
                <label><input type="radio" name="geo_type" value="1" id="q5_yes">埋立地・水辺</label>   
                <label><input type="radio" name="geo_type" value="0" checked>古い台地</label>
            </div>

            <button type="button" id="runB">地震発生</button>
            <div id="resultText" style="margin-top:15px; font-weight:bold;"></div>
            
            <div id="next-step" style="display: none; margin-top: 20px; text-align: center;">
                <p style="color: #d35400; font-weight: bold; margin-bottom: 10px;">シミュレーション終了！</p>
                <a href="https://liquefaction.my.canva.site/" target="_blank" class="canva-btn">📖 原理の解説を見る（Canva）</a>
            </div>
        </div>

        <div class="visual-panel">
            <h3>シミュレーション図</h3>
            <div class="svg-wrapper">
                <svg id="mainSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 200 841.89 350">
                    <defs>
                        <style>
                            .st0 { fill: #bdb17a; } /* 砂層 */
                            .st1 { fill: #97c0db; opacity: 0.7; } /* 水 */
                            .st2 { fill: #fff; stroke-width: 2.83px; } /* 地表線 */
                            .st3 { fill: #8f7640; } /* 粘土層 */
                            .st0, .st1, .st2, .st3 { stroke: #231815; stroke-miterlimit: 10; }
                            .st0, .st1, .st3 { stroke-width: 1.13px; }
                            .st4 { font-size: 14px; font-weight: bold; }
                            .st4, .st5, .st6, .st7 { fill: #231815; font-family: 'Kozuka Gothic Pr6N'; }
                            .st5 { font-size: 17.01px; }
                            .st6 { font-size: 17.1px; }
                            .st7 { font-size: 12px; }
                            
                            /* アニメーション用：変形の基準点を調整 */
                            #ground-all, #buildings, #soil_liquefaction {
                                transform-box: fill-box;
                                transform-origin: center bottom;
                                transition: transform 0.5s ease;
                            }
                        </style>
                    </defs>

                    <g id="ground-all">
                        <g id="soil_cray" style="display: none;">
                            <rect class="st3" x="41.91" y="298.96" width="766.43" height="300"/>
                            <text class="st6" transform="translate(700 480)">粘土層</text>
                        </g>

                        <g id="soil_sand">
                            <rect class="st0" x="41.91" y="297.64" width="766.43" height="300"/>
                            <text class="st5" transform="translate(700 480)">砂層</text>
                        </g>

                        <g id="soil_liquefaction" style="display: none;">
                            <rect fill="#e0c38a" stroke="#231815" stroke-width="1" x="41.91" y="297.64" width="766.43" height="200"/>
                            <text class="st4" transform="translate(171.82 374.19)">液状化しやすい層</text>
                        </g>

                        <g id="groundwater" style="transition: transform 0.5s ease;">
                            <rect class="st1" x="41.91" y="354.99" width="766.43" height="300"/>
                        </g>

                        <g id="annotation_base">
                            <text class="st7" transform="translate(780 290)">地表</text>
                        </g>

                        <g id="ground_surface">
                            <line class="st2" x1="41.91" y1="297.64" x2="808.34" y2="297.64"/>
                        </g>
                    </g>

                    <g id="buildings">
                        <image id="buil" width="800" height="250" x="20" y="50" href="building.png" />
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
